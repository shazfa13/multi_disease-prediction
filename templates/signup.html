<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Chest X-ray AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            color: #e2e8f0;
            background:
                radial-gradient(circle at 8% 8%, rgba(59, 130, 246, 0.2), transparent 25%),
                radial-gradient(circle at 95% 92%, rgba(30, 58, 138, 0.26), transparent 30%),
                linear-gradient(180deg, #0f172a 0%, #070d1f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.9), rgba(10, 16, 33, 0.9));
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(2, 6, 23, 0.5);
            padding: 50px 40px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-logo {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .auth-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: #f8fafc;
            margin-bottom: 8px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .auth-header p {
            color: #94a3b8;
            font-size: 13px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #bfdbfe;
            font-size: 13px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            color: #e2e8f0;
            background: rgba(15, 23, 42, 0.72);
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(96, 165, 250, 0.78);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
        }

        .form-group input::placeholder {
            color: #64748b;
        }

        .error-message {
            background: rgba(127, 29, 29, 0.28);
            color: #fecaca;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            border-left: 4px solid #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.35);
        }

        .password-note {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(140deg, rgba(30, 58, 138, 0.9), rgba(59, 130, 246, 0.62));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(30, 58, 138, 0.45);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: #94a3b8;
        }

        .auth-footer a {
            color: #93c5fd;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .auth-footer a:hover {
            color: #dbeafe;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #93c5fd;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #dbeafe;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="{{ url_for('welcome') }}" class="back-link">← Back</a>

        <div class="auth-header">
            <div class="auth-logo">📝</div>
            <h1>Create Account</h1>
            <p>Join X-ray Desk today</p>
        </div>

        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Choose a username"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Enter your email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Create a password"
                    required
                >
                <div class="password-note">Minimum 6 characters</div>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input 
                    type="password" 
                    id="confirm_password" 
                    name="confirm_password" 
                    placeholder="Confirm your password"
                    required
                >
            </div>

            <button type="submit" class="submit-btn">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
        </div>
    </div>
</body>
</html>
